<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F0E8"/>
      <stop offset="1" stop-color="#EFE7D7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative art — bolder strokes -->
  <circle cx="980" cy="280" r="230" stroke="#C8BDA0" stroke-width="2"/>
  <circle cx="980" cy="280" r="160" stroke="#C8BDA0" stroke-width="2"/>
  <circle cx="980" cy="280" r="100" stroke="#C4622D" stroke-width="2.5" opacity="0.7"/>
  <rect x="740" y="80" width="260" height="400" rx="18" stroke="#C8BDA0" stroke-width="2" fill="rgba(245,240,232,0.15)"/>

  <!-- Vertical line — left -->
  <rect x="100" y="100" width="3" height="430" rx="1.5" fill="#C8BDA0"/>

  <!-- Main title -->
  <text x="140" y="270" fill="#1A1410" font-size="128" font-family="Georgia, 'Times New Roman', serif" font-weight="700" letter-spacing="-2">grandkojo</text>
  <!-- Rust dot accent -->
  <circle cx="818" cy="236" r="10" fill="#C4622D"/>

  <!-- Subtitle -->
  <text x="146" y="330" fill="#C4622D" font-size="36" font-family="'Courier New', monospace" font-weight="700" letter-spacing="10">SOFTWARE &amp; SERVICES</text>

  <!-- CTA button -->
  <rect x="140" y="390" width="340" height="58" rx="4" fill="#1A1410"/>
  <text x="310" y="427" fill="#F5F0E8" font-size="17" font-family="'Courier New', monospace" font-weight="700" letter-spacing="5" text-anchor="middle">EXPLORE SERVICES →</text>

  <!-- URL — bold and clear -->
  <text x="140" y="550" fill="#6B5E4E" font-size="24" font-family="'Courier New', monospace" font-weight="700" letter-spacing="3">grandkojo.my</text>

  <!-- Small decorative dot bottom-right -->
  <circle cx="1100" cy="550" r="6" fill="#C4622D" opacity="0.6"/>
</svg>
